org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
android.useAndroidX=true
android.nonTransitiveRClass=true
kotlin.code.style=official
org.gradle.caching=true
org.gradle.parallel=true
kotlin.incremental=true

# R8 "full mode" (AGP 8's default) is more aggressive about erasing generic signatures than
# Retrofit's suspend-fun/Response<T> reflection can tolerate even with explicit keep rules (hit
# "Class cannot be cast to ParameterizedType" and then "Response must include generic type" on
# every API call under full mode). Compat mode still gets the vast majority of the shrink-size
# win (classes.dex went from ~41MB unminified to ~5MB) without that failure mode.
android.enableR8.fullMode=false
